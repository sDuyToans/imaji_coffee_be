services:
  mysql:
    image: mysql:8.0
    container_name: imaji_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: imajicoffee
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  app:
    build: .
    container_name: imaji_app
    restart: "no"
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
      LOG_LEVEL: INFO

      DATABASE_HOST: mysql
      DATABASE_PORT: 3306
      DATABASE_NAME: imajicoffee
      DATABASE_USERNAME: root
      DATABASE_PASSWORD: root

      JPA_SHOW_SQL: true
      HIBERNATE_FORMAT_SQL: true

      JWT_SECRET: "0123456789abcdef0123456789abcdef"
      STRIPE_SECRET_KEY: "change_me_stripe_secret"
      STRIPE_WEBHOOK_SECRET: "change_me_webhook_secret"

      MAIL_USERNAME: "your_email@gmail.com"
      MAIL_PASSWORD: "your_gmail_app_password"

      GOOGLE_CLIENT_ID: "your_google_client_id"
      GOOGLE_CLIENT_SECRET: "your_google_client_secret"

      CORS_ALLOWED_ORIGINS: "http://localhost:5173"
      FRONT_END_CALL_BACK_URL: "http://localhost:5173/auth/callback"

volumes:
  mysql_data:
